# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Playwright Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:

    runs-on: windows-latest #ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: true
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest-playwright
        python -m pip install playwright
        python -m pip install python-dotenv
        python -m pip install pytest-xdist
        python -m pip install pytest-playwright-visual
    - name: Install chromium 
      run: |
        python -m playwright install chromium
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        STANDARD_USER: ${{ secrets.STANDARD_USER }}
        LOCKED_OUT_USER:  ${{ secrets.LOCKED_OUT_USER }}
        PROBLEM_USER: ${{ secrets.PROBLEM_USER }}
        PERFORMANCE_GLITCH_USER: ${{ secrets.PERFORMANCE_GLITCH_USER }}
        ERROR_USER: ${{ secrets.ERROR_USER }}
        VISUAL_USER: ${{ secrets.VISUAL_USER }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: pytest

    - name: Commit updated snapshots
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add .
        git commit -m "Update snapshots from CI" || echo "No changes to commit"
        git push
      
